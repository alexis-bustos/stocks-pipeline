<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="tierPresentation" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="tierLogic" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="tierData" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="820" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="600" y="42" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700" letter-spacing="1">Stocks Serverless Pipeline — Architecture</text>
  <text x="600" y="64" text-anchor="middle" fill="#94a3b8" font-size="13" letter-spacing="0.5">Three-Tier Serverless Architecture on AWS Free Tier</text>

  <!-- ==================== TIER LABELS (left side) ==================== -->
  <!-- Presentation Tier label -->
  <rect x="20" y="88" width="14" height="155" rx="7" fill="#3b82f6" opacity="0.8"/>
  <text x="27" y="175" fill="#3b82f6" font-size="12" font-weight="600" letter-spacing="1.5" transform="rotate(-90,27,175)" text-anchor="middle">PRESENTATION</text>

  <!-- Logic Tier label -->
  <rect x="20" y="262" width="14" height="330" rx="7" fill="#f59e0b" opacity="0.8"/>
  <text x="27" y="427" fill="#f59e0b" font-size="12" font-weight="600" letter-spacing="1.5" transform="rotate(-90,27,427)" text-anchor="middle">LOGIC</text>

  <!-- Data Tier label -->
  <rect x="20" y="612" width="14" height="155" rx="7" fill="#10b981" opacity="0.8"/>
  <text x="27" y="690" fill="#10b981" font-size="12" font-weight="600" letter-spacing="1.5" transform="rotate(-90,27,690)" text-anchor="middle">DATA</text>

  <!-- ==================== TIER BACKGROUNDS ==================== -->
  <rect x="48" y="88" width="1132" height="155" rx="10" fill="url(#tierPresentation)" stroke="#3b82f6" stroke-opacity="0.25" stroke-width="1"/>
  <rect x="48" y="262" width="1132" height="330" rx="10" fill="url(#tierLogic)" stroke="#f59e0b" stroke-opacity="0.25" stroke-width="1"/>
  <rect x="48" y="612" width="1132" height="155" rx="10" fill="url(#tierData)" stroke="#10b981" stroke-opacity="0.25" stroke-width="1"/>

  <!-- ==================== PRESENTATION TIER ==================== -->
  <!-- User -->
  <g filter="url(#shadow)">
    <rect x="100" y="125" width="150" height="80" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="175" y="157" text-anchor="middle" fill="#93c5fd" font-size="22">👤</text>
    <text x="175" y="178" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">User / Browser</text>
    <text x="175" y="194" text-anchor="middle" fill="#64748b" font-size="10">HTTPS Request</text>
  </g>

  <!-- S3 Static Site -->
  <g filter="url(#shadow)">
    <rect x="380" y="110" width="200" height="110" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="480" y="140" text-anchor="middle" fill="#93c5fd" font-size="11" font-weight="700" letter-spacing="1">AWS S3</text>
    <text x="480" y="162" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="600">Static Website</text>
    <text x="480" y="180" text-anchor="middle" fill="#64748b" font-size="10">SPA (HTML/CSS/JS)</text>
    <text x="480" y="196" text-anchor="middle" fill="#64748b" font-size="10">Fetches from API Gateway</text>
    <text x="480" y="212" text-anchor="middle" fill="#475569" font-size="9" font-style="italic">or AWS Amplify</text>
  </g>

  <!-- Arrow: User → S3 -->
  <line x1="250" y1="165" x2="375" y2="165" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)" stroke-dasharray="6,3"/>

  <!-- ==================== LOGIC TIER ==================== -->

  <!-- === INGESTION PATH (Left) === -->
  <text x="300" y="290" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700" letter-spacing="1.5">INGESTION PATH</text>
  <text x="300" y="305" text-anchor="middle" fill="#92400e" font-size="10">(Daily Cron — Write)</text>

  <!-- EventBridge -->
  <g filter="url(#shadow)">
    <rect x="100" y="325" width="170" height="85" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="185" y="353" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="700" letter-spacing="1">EVENTBRIDGE</text>
    <text x="185" y="374" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">Cron Schedule</text>
    <text x="185" y="393" text-anchor="middle" fill="#64748b" font-size="10">rate(1 day) trigger</text>
  </g>

  <!-- Ingestion Lambda -->
  <g filter="url(#shadow)">
    <rect x="100" y="455" width="170" height="105" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="185" y="480" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="700" letter-spacing="1">AWS LAMBDA</text>
    <text x="185" y="500" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">Ingestion Fn</text>
    <text x="185" y="518" text-anchor="middle" fill="#64748b" font-size="10">Fetch stock prices</text>
    <text x="185" y="533" text-anchor="middle" fill="#64748b" font-size="10">Calculate % change</text>
    <text x="185" y="548" text-anchor="middle" fill="#64748b" font-size="10">Find top mover</text>
  </g>

  <!-- Arrow: EventBridge → Ingestion Lambda -->
  <line x1="185" y1="410" x2="185" y2="450" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="198" y="435" fill="#f59e0b" font-size="9" font-weight="600">triggers</text>

  <!-- Stock API (external) -->
  <g filter="url(#shadow)">
    <rect x="380" y="455" width="170" height="105" rx="10" fill="#1e293b" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="465" y="480" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="700" letter-spacing="1">EXTERNAL</text>
    <text x="465" y="500" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">Stock API</text>
    <text x="465" y="518" text-anchor="middle" fill="#64748b" font-size="10">Polygon / Finnhub /</text>
    <text x="465" y="533" text-anchor="middle" fill="#64748b" font-size="10">AlphaVantage</text>
    <text x="465" y="548" text-anchor="middle" fill="#475569" font-size="9" font-style="italic">Free tier API key</text>
  </g>

  <!-- Arrow: Ingestion Lambda → Stock API -->
  <line x1="270" y1="507" x2="375" y2="507" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrowCyan)" stroke-dasharray="6,3"/>
  <text x="322" y="499" fill="#22d3ee" font-size="9" font-weight="600">GET prices</text>

  <!-- === RETRIEVAL PATH (Right) === -->
  <text x="870" y="290" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="700" letter-spacing="1.5">RETRIEVAL PATH</text>
  <text x="870" y="305" text-anchor="middle" fill="#92400e" font-size="10">(On-Demand — Read)</text>

  <!-- API Gateway -->
  <g filter="url(#shadow)">
    <rect x="770" y="325" width="200" height="85" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="870" y="353" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="700" letter-spacing="1">API GATEWAY</text>
    <text x="870" y="374" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">REST API</text>
    <text x="870" y="393" text-anchor="middle" fill="#64748b" font-size="10">GET /movers</text>
  </g>

  <!-- Retrieval Lambda -->
  <g filter="url(#shadow)">
    <rect x="785" y="455" width="170" height="105" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="870" y="480" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="700" letter-spacing="1">AWS LAMBDA</text>
    <text x="870" y="500" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">Retrieval Fn</text>
    <text x="870" y="518" text-anchor="middle" fill="#64748b" font-size="10">Query DynamoDB</text>
    <text x="870" y="533" text-anchor="middle" fill="#64748b" font-size="10">Return last 7 days</text>
    <text x="870" y="548" text-anchor="middle" fill="#64748b" font-size="10">Format JSON response</text>
  </g>

  <!-- Arrow: API Gateway → Retrieval Lambda -->
  <line x1="870" y1="410" x2="870" y2="450" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="883" y="435" fill="#f59e0b" font-size="9" font-weight="600">invokes</text>

  <!-- Arrow: S3 → API Gateway -->
  <path d="M 580 185 Q 680 185 680 290 Q 680 367 765 367" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)" stroke-dasharray="6,3"/>
  <text x="640" y="260" fill="#3b82f6" font-size="9" font-weight="600">fetch()</text>

  <!-- ==================== DATA TIER ==================== -->

  <!-- DynamoDB -->
  <g filter="url(#shadow)">
    <rect x="400" y="645" width="260" height="95" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
    <text x="530" y="672" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="700" letter-spacing="1">AMAZON DYNAMODB</text>
    <text x="530" y="694" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">TopMovers Table</text>
    <text x="530" y="714" text-anchor="middle" fill="#64748b" font-size="10">PK: date | Ticker, % Change,</text>
    <text x="530" y="729" text-anchor="middle" fill="#64748b" font-size="10">Close Price</text>
  </g>

  <!-- Arrow: Ingestion Lambda → DynamoDB -->
  <path d="M 185 560 L 185 692 L 395 692" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="260" y="685" fill="#10b981" font-size="9" font-weight="600">PutItem</text>

  <!-- Arrow: DynamoDB → Retrieval Lambda -->
  <path d="M 660 692 L 870 692 L 870 560" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="780" y="685" fill="#10b981" font-size="9" font-weight="600">Query</text>

  <!-- ==================== LEGEND ==================== -->
  <rect x="48" y="780" width="1132" height="30" rx="6" fill="#0f172a" fill-opacity="0.6"/>
  <circle cx="80" cy="795" r="5" fill="#f59e0b"/>
  <text x="92" y="799" fill="#94a3b8" font-size="10">AWS Managed Service</text>
  <circle cx="260" cy="795" r="5" fill="#22d3ee"/>
  <text x="272" y="799" fill="#94a3b8" font-size="10">External Service</text>
  <line x1="400" y1="795" x2="430" y2="795" stroke="#94a3b8" stroke-width="2"/>
  <text x="438" y="799" fill="#94a3b8" font-size="10">Solid = Sync</text>
  <line x1="540" y1="795" x2="570" y2="795" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="578" y="799" fill="#94a3b8" font-size="10">Dashed = Async / HTTP</text>
  <text x="1160" y="799" text-anchor="end" fill="#475569" font-size="9">IaC: Terraform / CDK / Serverless Framework</text>
</svg>
